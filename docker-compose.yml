services:
  bindarr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bindarr
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      # All optional. Uncomment and set as needed.
      # - POKEMON_TCG_API_KEY=          # Pokemon TCG API key to raise rate limits
      # - CORS_ORIGIN=                  # Frontend origin(s), comma-separated. Unset = localhost + private-LAN allowed
      # - PUBLIC_BASE_URL=              # Externally-reachable URL for share links behind a proxy, e.g. https://cards.example.com
      # - DEFAULT_ADMIN_PASSWORD=       # Pin the initial admin password instead of the auto-generated one (see startup logs)
      # - ALLOW_REGISTRATION=           # "true" = open self-registration. Unset = invite-only
      # - TRUST_PROXY=                  # "1" behind a TLS-terminating reverse proxy so rate limiting sees the real client IP
    volumes:
      - bindarr-data:/app/database

volumes:
  bindarr-data:
