name: Deploy Demo to GitHub Pages

# Builds the frontend in demo mode (fixture-backed, no backend) and publishes it
# to GitHub Pages. Manual dispatch, plus any push to main that touches the
# frontend. Enable Pages -> Source: GitHub Actions in repo settings once.
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths: [ 'frontend/**' ]

permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build demo bundle
        working-directory: frontend
        env:
          VITE_DEMO: '1'
        run: |
          npm ci
          npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
