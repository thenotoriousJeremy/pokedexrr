name: Build Mobile Apps

# workflow_dispatch -> build only: uploads packages as workflow artifacts (test).
# push a v* tag  -> release: also uploads Android .aab to Google Play (internal
# track) and the iOS .ipa to TestFlight, and attaches both to the GitHub Release.
# Store-upload steps are gated on the tag event, so dispatch never touches a store.
on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build web + sync Capacitor
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npx cap sync android

      - name: Build APK + AAB
        working-directory: frontend/android
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          BINDARR_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BINDARR_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          BINDARR_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_NAME: ${{ github.ref_type == 'tag' && github.ref_name || '0.0.0' }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
        run: |
          chmod +x ./gradlew
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > release.keystore
            export BINDARR_KEYSTORE_FILE="$PWD/release.keystore"
            ./gradlew bundleRelease assembleRelease
            echo "APK=frontend/android/app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_ENV"
            echo "AAB=frontend/android/app/build/outputs/bundle/release/app-release.aab" >> "$GITHUB_ENV"
          else
            echo "No keystore secret set — building a debug APK (installable, debug-signed)."
            ./gradlew assembleDebug
            echo "APK=frontend/android/app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_ENV"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ env.APK }}

      - uses: actions/upload-artifact@v4
        if: env.AAB != ''
        with:
          name: android-aab
          path: ${{ env.AAB }}

      - name: Upload to Google Play (internal track)
        if: github.ref_type == 'tag' && env.AAB != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.bindarr.app
          releaseFiles: ${{ env.AAB }}
          track: internal

      - name: Rename APK for release
        if: github.ref_type == 'tag'
        run: cp "${{ env.APK }}" "Bindarr-Android.apk"

      - name: Attach APK to release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: Bindarr-Android.apk

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Apple signing secrets
        id: gate
        env:
          CERT: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        run: echo "ready=${{ secrets.IOS_CERTIFICATE_BASE64 != '' }}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.ready == 'true'
        with:
          node-version: 22

      - name: Build web + sync Capacitor
        if: steps.gate.outputs.ready == 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npx cap sync ios

      - name: Import signing certificate
        if: steps.gate.outputs.ready == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        if: steps.gate.outputs.ready == 'true'
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/bindarr.mobileprovision

      - name: Write ExportOptions.plist
        if: steps.gate.outputs.ready == 'true'
        working-directory: frontend/ios/App
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.bindarr.app</key><string>${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Archive
        if: steps.gate.outputs.ready == 'true'
        working-directory: frontend/ios/App
        run: |
          VERSION="${{ github.ref_type == 'tag' && github.ref_name || '0.0.0' }}"
          xcodebuild -project App.xcodeproj -scheme App -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -destination 'generic/platform=iOS' \
            MARKETING_VERSION="${VERSION#v}" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}" \
            archive

      - name: Export IPA
        if: steps.gate.outputs.ready == 'true'
        working-directory: frontend/ios/App
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - uses: actions/upload-artifact@v4
        if: steps.gate.outputs.ready == 'true'
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/export/*.ipa

      - name: Upload to TestFlight
        if: steps.gate.outputs.ready == 'true' && github.ref_type == 'tag'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_BASE64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          IPA=$(ls "$RUNNER_TEMP"/export/*.ipa | head -1)
          xcrun altool --upload-app --type ios --file "$IPA" \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

      - name: Rename IPA for release
        if: steps.gate.outputs.ready == 'true' && github.ref_type == 'tag'
        run: cp "$(ls "$RUNNER_TEMP"/export/*.ipa | head -1)" "$RUNNER_TEMP/Bindarr-Apple-iOS.ipa"

      - name: Attach IPA to release
        if: steps.gate.outputs.ready == 'true' && github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/Bindarr-Apple-iOS.ipa
